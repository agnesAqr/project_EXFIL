<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Cache Separation Architecture</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0e17; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Consolas', 'Courier New', monospace; }
  .container { width: 1000px; padding: 40px; }
  h2 { color: #00e5ff; font-size: 14px; letter-spacing: 3px; margin-bottom: 24px; font-weight: 400; }
</style>
</head>
<body>
<div class="container">
  <h2>— INVENTORY REPLICATION + LOCAL CACHE ARCHITECTURE</h2>
  
  <svg width="960" height="500" viewBox="0 0 960 500" fill="none" xmlns="http://www.w3.org/2000/svg" style="font-family: Consolas, Courier New, monospace;">

    <!-- ==================== SERVER SIDE ==================== -->
    <text x="20" y="24" fill="#f85149" font-size="11" letter-spacing="2" font-weight="600">DEDICATED SERVER</text>
    <line x1="20" y1="34" x2="450" y2="34" stroke="#f8514933" stroke-width="2"/>
    
    <!-- Server TArray -->
    <rect x="20" y="50" width="420" height="100" rx="6" fill="#161b22" stroke="#f8514944"/>
    <text x="35" y="70" fill="#f85149" font-size="10" font-weight="600">Replicated (네트워크 전송)</text>
    
    <rect x="35" y="80" width="200" height="55" rx="4" fill="#0a0e17" stroke="#58a6ff44"/>
    <text x="45" y="97" fill="#58a6ff" font-size="8" font-weight="600">TArray&lt;FInventoryItemInstance&gt;</text>
    <text x="45" y="110" fill="#58a6ff" font-size="9" font-weight="600">Items</text>
    <text x="45" y="124" fill="#d29922" font-size="8">COND_OwnerOnly</text>
    
    <rect x="250" y="80" width="175" height="55" rx="4" fill="#0a0e17" stroke="#58a6ff44"/>
    <text x="260" y="97" fill="#58a6ff" font-size="8" font-weight="600">TArray&lt;int32&gt;</text>
    <text x="260" y="110" fill="#58a6ff" font-size="9" font-weight="600">GridSlots</text>
    <text x="260" y="124" fill="#d29922" font-size="8">COND_OwnerOnly</text>

    <!-- Server modify arrow -->
    <rect x="20" y="165" width="420" height="35" rx="4" fill="#161b22" stroke="#3fb95044"/>
    <text x="35" y="187" fill="#3fb950" font-size="10">TryAddItemByID / RemoveItem / MoveItem → Items 변경 → 캐시 리빌드</text>
    
    <!-- ==================== REPLICATION ARROW ==================== -->
    <line x1="230" y1="220" x2="230" y2="260" stroke="#58a6ff" stroke-width="2"/>
    <polygon points="230,260 224,250 236,250" fill="#58a6ff"/>
    <text x="245" y="238" fill="#58a6ff" font-size="9">DOREPLIFETIME</text>
    <text x="245" y="250" fill="#8b949e" font-size="8">Owner Client에게만 전파</text>

    <!-- ==================== CLIENT SIDE ==================== -->
    <text x="20" y="283" fill="#58a6ff" font-size="11" letter-spacing="2" font-weight="600">OWNER CLIENT</text>
    <line x1="20" y1="293" x2="940" y2="293" stroke="#58a6ff33" stroke-width="2"/>
    
    <!-- Client TArray (replicated copy) -->
    <rect x="20" y="305" width="280" height="80" rx="6" fill="#161b22" stroke="#58a6ff44"/>
    <text x="35" y="325" fill="#58a6ff" font-size="10" font-weight="600">Replicated 데이터 (서버에서 수신)</text>
    
    <rect x="35" y="335" width="110" height="38" rx="4" fill="#0a0e17" stroke="#58a6ff33"/>
    <text x="45" y="352" fill="#58a6ff" font-size="9">TArray Items</text>
    <text x="45" y="365" fill="#8b949e" font-size="8">OnRep_Items()</text>
    
    <rect x="160" y="335" width="125" height="38" rx="4" fill="#0a0e17" stroke="#58a6ff33"/>
    <text x="170" y="352" fill="#58a6ff" font-size="9">TArray GridSlots</text>
    <text x="170" y="365" fill="#8b949e" font-size="8">Replicated</text>
    
    <!-- OnRep arrow -->
    <line x1="300" y1="345" x2="340" y2="345" stroke="#d29922" stroke-width="2"/>
    <polygon points="340,345 332,339 332,351" fill="#d29922"/>
    
    <!-- OnRep_Items box -->
    <rect x="345" y="305" width="200" height="80" rx="6" fill="#161b22" stroke="#d2992244"/>
    <text x="360" y="325" fill="#d29922" font-size="10" font-weight="600">OnRep_Items()</text>
    <text x="360" y="345" fill="#e6edf3" font-size="9">RebuildItemIndexMap();</text>
    <text x="360" y="360" fill="#e6edf3" font-size="9">RebuildItemCountCache();</text>
    <text x="360" y="375" fill="#e6edf3" font-size="9">RebuildRowBitmap();</text>
    
    <!-- Cache rebuild arrows -->
    <line x1="545" y1="325" x2="590" y2="325" stroke="#3fb950" stroke-width="1.5"/>
    <polygon points="590,325 583,320 583,330" fill="#3fb950"/>
    <line x1="545" y1="345" x2="590" y2="345" stroke="#3fb950" stroke-width="1.5"/>
    <polygon points="590,345 583,340 583,350" fill="#3fb950"/>
    <line x1="545" y1="365" x2="590" y2="365" stroke="#3fb950" stroke-width="1.5"/>
    <polygon points="590,365 583,360 583,370" fill="#3fb950"/>
    
    <!-- Local caches -->
    <rect x="595" y="305" width="345" height="130" rx="6" fill="#161b22" stroke="#3fb95044"/>
    <text x="610" y="325" fill="#3fb950" font-size="10" font-weight="600">로컬 전용 캐시 (리플리케이션 제외)</text>
    <text x="610" y="340" fill="#8b949e" font-size="8">GetLifetimeReplicatedProps 미등록</text>
    
    <!-- ItemIndexMap -->
    <rect x="610" y="350" width="150" height="35" rx="4" fill="#0a0e17" stroke="#3fb95033"/>
    <text x="620" y="365" fill="#3fb950" font-size="9" font-weight="600">ItemIndexMap</text>
    <text x="620" y="378" fill="#8b949e" font-size="8">TMap&lt;FGuid, int32&gt;</text>
    
    <!-- ItemCountCache -->
    <rect x="770" y="350" width="155" height="35" rx="4" fill="#0a0e17" stroke="#3fb95033"/>
    <text x="780" y="365" fill="#3fb950" font-size="9" font-weight="600">ItemCountCache</text>
    <text x="780" y="378" fill="#8b949e" font-size="8">TMap&lt;FName, int32&gt;</text>
    
    <!-- RowBitmap -->
    <rect x="610" y="392" width="315" height="35" rx="4" fill="#0a0e17" stroke="#3fb95033"/>
    <text x="620" y="407" fill="#3fb950" font-size="9" font-weight="600">RowBitmap</text>
    <text x="750" y="407" fill="#8b949e" font-size="8">TArray&lt;uint16&gt; — 행별 점유 비트마스크</text>
    
    <!-- ==================== BOTTOM: Usage ==================== -->
    <line x1="20" y1="445" x2="940" y2="445" stroke="#30363d" stroke-width="1"/>
    
    <!-- Usage boxes -->
    <rect x="20" y="455" width="200" height="35" rx="4" fill="#161b22" stroke="#3fb95033"/>
    <text x="35" y="470" fill="#3fb950" font-size="9">FindItemByInstanceID()</text>
    <text x="35" y="483" fill="#8b949e" font-size="8">→ ItemIndexMap.Find() <tspan fill="#00e5ff" font-weight="600">O(1)</tspan></text>
    
    <rect x="240" y="455" width="200" height="35" rx="4" fill="#161b22" stroke="#3fb95033"/>
    <text x="255" y="470" fill="#3fb950" font-size="9">GetItemCountByID()</text>
    <text x="255" y="483" fill="#8b949e" font-size="8">→ ItemCountCache.Find() <tspan fill="#00e5ff" font-weight="600">O(1)</tspan></text>
    
    <rect x="460" y="455" width="200" height="35" rx="4" fill="#161b22" stroke="#3fb95033"/>
    <text x="475" y="470" fill="#3fb950" font-size="9">AreSlotsFree()</text>
    <text x="475" y="483" fill="#8b949e" font-size="8">→ RowBitmap &amp; Mask <tspan fill="#00e5ff" font-weight="600">O(1)</tspan></text>
    
    <rect x="680" y="455" width="260" height="35" rx="4" fill="#161b22" stroke="#d2992233"/>
    <text x="695" y="470" fill="#d29922" font-size="9">Dirty Flag → ViewModel</text>
    <text x="695" y="483" fill="#8b949e" font-size="8">변경 슬롯만 TSet&lt;int32&gt;로 전파</text>
    
  </svg>
</div>
</body>
</html>
